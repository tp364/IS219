name: Docker CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Detect project directory
        run: |
          if [ -f "Dockerfile" ] && [ -f "requirements.txt" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          elif [ -f "Docker Project/Dockerfile" ] && [ -f "Docker Project/requirements.txt" ]; then
            echo "PROJECT_DIR=Docker Project" >> "$GITHUB_ENV"
          else
            echo "Could not find Dockerfile + requirements.txt in root or Docker Project/"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build Docker image
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker build -t qr-code-generator-app -f Dockerfile .

      - name: Run container smoke test
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker run --name qr-ci-test qr-code-generator-app --url https://www.njit.edu
          docker logs qr-ci-test

      - name: Clean up test container
        if: always()
        run: docker rm -f qr-ci-test || true

